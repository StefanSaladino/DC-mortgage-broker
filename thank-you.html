<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Thank You | David Colavita Mortgage Agent Level 2</title>
    <meta name="description" content="Thank you for contacting David Colavita about your mortgage inquiry." />
    <meta name="robots" content="noindex,follow" />

    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="assets/images/favicon.png" />
    <meta name="theme-color" content="#050508" />

    <link rel="stylesheet" href="assets/css/global.v1.css" />

    <style>
      .thank-you {
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: calc(var(--header-total-height) + 4rem) 0 4rem;
        background:
          radial-gradient(circle at 20% 30%, rgba(159, 52, 255, 0.26), transparent 28%),
          linear-gradient(135deg, #050508, #11101a 55%, #050508);
      }

      .thank-you__card {
        max-width: 48rem;
        padding: clamp(1.4rem, 4vw, 2.4rem);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.045);
        box-shadow: var(--shadow);
      }

      .thank-you__card h1 {
        margin-bottom: 1rem;
        font-size: clamp(2.7rem, 7vw, 5.8rem);
      }

      .thank-you__card p {
        max-width: 38rem;
        color: rgba(255, 255, 255, 0.74);
      }

      .thank-you__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin-top: 1.5rem;
      }

      @media (max-width: 520px) {
        .thank-you__actions .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <div id="siteHeaderMount"></div>

    <main id="main">
      <section class="thank-you">
        <div class="container">
          <div class="thank-you__card">
            <p class="eyebrow">Inquiry received</p>
            <h1>Thank you.</h1>
            <p>
              Your message has been received. David will follow up using the contact information
              you provided.
            </p>

            <div class="thank-you__actions">
              <a class="btn btn--primary" href="index.html">Back to home</a>
              <a class="btn btn--ghost" href="tel:+16474441347">Call David</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooterMount"></div>

    <script src="assets/js/global.v1.js" defer></script>
  </body>
</html>
